---
- name: Healthcheck Leakguard Agent on the canary host
  hosts: HOST-TEST2
  gather_facts: false
  ignore_unreachable: true
  vars_files:
    - ../group_vars/sharex_pilot.yml

  pre_tasks:
    - name: Check WinRM connectivity before canary healthcheck
      ansible.windows.win_ping:
      register: winrm_ping_result
      ignore_unreachable: true
      ignore_errors: true

    - name: Show canary connectivity failure summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Target: {{ ansible_host }}"
          - "Connection: {{ ansible_connection | default('n/a') }}"
          - "Transport: {{ ansible_winrm_transport | default('n/a') }}"
          - "User: {{ ansible_user | default('n/a') }}"
          - "Status: FALHOU"
          - >-
            Detalhe: {{
              winrm_ping_result.msg
              | default('host offline ou sem conectividade WinRM no momento')
            }}
      when: winrm_ping_result.ping | default('') != 'pong'

    - name: Stop canary healthcheck on unreachable host
      ansible.builtin.meta: end_host
      when: winrm_ping_result.ping | default('') != 'pong'

  tasks:
    - name: Query service info
      ansible.windows.win_service_info:
        name: "{{ agent_service_name }}"
      register: agent_service

    - name: Inspect rendered agent config
      ansible.windows.win_powershell:
        script: |
          $configPath = "{{ agent_programdata_root }}\agent_config.json"
          if (-not (Test-Path $configPath)) {
            Write-Output "agent_config.json not found"
            exit 0
          }

          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          [pscustomobject]@{
            config_path = $configPath
            api_enabled = [bool]$config.api.enabled
            api_base_url = [string]$config.api.base_url
            heartbeat_path = [string]$config.api.heartbeat_path
            ingest_confirm_path = [string]$config.api.ingest_confirm_path
            bearer_token_present = -not [string]::IsNullOrWhiteSpace([string]$config.api.bearer_token)
            agent_id = [string]$config.api.agent_id
            spool_dir = [string]$config.paths.spool_dir
            log_path = [string]$config.paths.log_path
          } | ConvertTo-Json -Compress
      register: agent_config_summary

    - name: Check queue database
      ansible.windows.win_stat:
        path: "{{ agent_programdata_root }}\\data\\queue.db"
      register: queue_db

    - name: Tail agent log
      ansible.windows.win_powershell:
        script: |
          $log = "{{ agent_programdata_root }}\logs\agent.log"
          if (Test-Path $log) {
            Get-Content $log -Tail 30
          } else {
            Write-Output "agent.log not found"
          }
      register: agent_log

    - name: Tail service stdout log
      ansible.windows.win_powershell:
        script: |
          $log = "{{ agent_programdata_root }}\logs\service-stdout.log"
          if (Test-Path $log) {
            Get-Content $log -Tail 30
          } else {
            Write-Output "service-stdout.log not found"
          }
      register: service_stdout_log

    - name: Tail service stderr log
      ansible.windows.win_powershell:
        script: |
          $log = "{{ agent_programdata_root }}\logs\service-stderr.log"
          if (Test-Path $log) {
            Get-Content $log -Tail 30
          } else {
            Write-Output "service-stderr.log not found"
          }
      register: service_stderr_log

    - name: Show health summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Connection: {{ ansible_connection | default('n/a') }}"
          - "Transport: {{ ansible_winrm_transport | default('n/a') }}"
          - "User: {{ ansible_user | default('n/a') }}"
          - "Service exists: {{ agent_service.exists | default(false) }}"
          - "Service state: {{ (agent_service.services | default([]) | first).state | default('missing') }}"
          - "Agent config summary:"
          - "{{ agent_config_summary.output | default([]) }}"
          - "Queue DB exists: {{ queue_db.stat.exists }}"
          - "Recent agent.log lines:"
          - "{{ agent_log.output | default([]) }}"
          - "Recent service-stdout.log lines:"
          - "{{ service_stdout_log.output | default([]) }}"
          - "Recent service-stderr.log lines:"
          - "{{ service_stderr_log.output | default([]) }}"
